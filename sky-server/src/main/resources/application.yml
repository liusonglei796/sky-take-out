server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    # Spring Boot 4.0 使用 HikariCP（已移除 Druid，与 SB4 不兼容）
    driver-class-name: ${sky.datasource.driver-class-name}
    url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${sky.datasource.username}
    password: ${sky.datasource.password}
  # Java 25 虚拟线程（Project Loom），提升高并发吞吐量
  threads:
    virtual:
      enabled: true

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

# Knife4j 5.x API 文档配置（替代原 Springfox Docket Bean）
knife4j:
  enable: true
  openapi:
    title: 苍穹外卖项目接口文档
    description: 苍穹外卖管理端与用户端 REST API
    version: "2.0"
    group:
      admin:
        group-name: 管理端接口
        packages-to-scan: com.sky.controller.admin,com.sky.controller.nofity
      user:
        group-name: 用户端接口
        packages-to-scan: com.sky.controller.user

sky:
  jwt:
    # 设置jwt签名加密时使用的秘钥（生产环境应使用环境变量）
    admin-secret-key: ${sky.jwt.admin-secret-key:itcast}
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    # 用户端jwt配置
    user-secret-key: ${sky.jwt.user-secret-key:itcast}
    user-ttl: 604800000
    user-token-name: userToken
